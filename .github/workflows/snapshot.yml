name: event-snapshot

on:
  # JST 12:00 = UTC 03:00, JST 24:00 (翌 00:00) = UTC 15:00
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      event_ids:
        description: "Comma-separated event IDs (empty = auto-discover)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore session state from chunked secrets
        env:
          BCODE_P1: ${{ secrets.STORAGE_BCODE_PART1 }}
          BCODE_P2: ${{ secrets.STORAGE_BCODE_PART2 }}
          BCODE_P3: ${{ secrets.STORAGE_BCODE_PART3 }}
          ULYSSES_P1: ${{ secrets.STORAGE_ULYSSES_PART1 }}
          ULYSSES_P2: ${{ secrets.STORAGE_ULYSSES_PART2 }}
          ULYSSES_P3: ${{ secrets.STORAGE_ULYSSES_PART3 }}
        run: |
          mkdir -p sessions
          # Chunks were produced via: base64(gzip(storage_state.json)) then split
          printf '%s%s%s' "$BCODE_P1" "$BCODE_P2" "$BCODE_P3" | base64 -d | gunzip > sessions/storage_state.json
          if [ -n "$ULYSSES_P1" ]; then
            printf '%s%s%s' "$ULYSSES_P1" "$ULYSSES_P2" "$ULYSSES_P3" | base64 -d | gunzip > sessions/storage_state_ulysses.json
          fi
          wc -c sessions/*.json
          python -c "import json; print('bcode cookies:', len(json.load(open('sessions/storage_state.json'))['cookies']))"

      - name: Run event snapshot
        env:
          HEADLESS: "1"
          STORAGE_BCODE: ${{ github.workspace }}/sessions/storage_state.json
          STORAGE_ULYSSES: ${{ github.workspace }}/sessions/storage_state_ulysses.json
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_KARTE_DB_ID: ${{ secrets.NOTION_KARTE_DB_ID }}
          NOTION_RESULTS_DB_ID: ${{ secrets.NOTION_RESULTS_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          EVENT_IDS="${{ github.event.inputs.event_ids }}"
          if [ -n "$EVENT_IDS" ]; then
            python run.py --event-ids="$EVENT_IDS"
          else
            python run.py
          fi

      - name: Slack notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"🚨 *イベントスナップショット失敗*\\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\\nセッション切れの可能性あり。ログ確認 → storage_state 更新要\"}" \
              "$WEBHOOK" || true
          fi

      - name: Back up refreshed sessions to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sessions-refreshed-${{ github.run_id }}
          path: sessions/*.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit snapshot outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit events/ — never sessions/
          git add events/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "snapshot: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
